<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <!-- 禁用户缩放:liveware 容器里的 app 质感(双击/捏合缩放是「网页感」的来源,微信小程序同款) -->
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content" />
  <title>Tarven</title>
  <meta name="application-name" content="Tarven" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Tarven" />
  <meta property="og:description" content="角色卡、世界书和世界都在这里，慢慢往下走。" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Tarven" />
  <meta name="twitter:description" content="角色卡、世界书和世界都在这里，慢慢往下走。" />
  <link rel="stylesheet" href="console.css?v=20260717-1" />
</head>
<!-- 文案 i18n:静态节点走 data-i18n*(i18n.js applyStatic 填),动态节点 app.js 用 t()。
     HTML 里保留中文 = JS 前的闪现兜底,权威文案在 i18n.js 的 STRINGS。 -->
<body data-doc-title="appWindowTitleConsole">
  <div id="layout">
    <aside id="rail" class="pane">
      <div class="panehd" data-i18n="railHead">世界</div>
      <ul id="prodList" class="prodList"></ul>
      <div class="railacts">
        <button id="newWorldBtn" class="btn" data-i18n="newWorld">开启新世界</button>
        <input id="cardFile" type="file" accept="image/png" hidden />
      </div>
    </aside>

    <main id="stage">
      <header id="topbar" class="topbar">
        <button id="railToggle" type="button" class="iconbtn" aria-label="世界" data-i18n-aria="ariaRail">☰</button>
        <div class="topTitle">
          <div class="tline"><span class="mark">✦</span><span id="prodName" class="prodName">酒馆</span></div>
          <div id="prodSub" class="prodSub"></div>
        </div>
        <button id="panelToggle" type="button" class="iconbtn" aria-label="角色与设定" data-i18n-aria="ariaPanel">ⓘ</button>
      </header>
      <div id="convo" class="convo">
        <div id="empty" class="empty">
          <div class="emptyMark">✦</div>
          <p data-i18n="emptyLead">导入一张角色卡，开一场戏。</p>
          <p class="hint" data-i18n="emptyHint">主理人会帮你铺开故事。</p>
        </div>
      </div>
      <div id="historyScrollbar" class="historyScrollbar" aria-hidden="true">
        <div id="historyScrollThumb" class="historyScrollThumb"></div>
      </div>
      <form id="composer" class="composer">
        <!-- 动作按钮:把文字框成 *动作*(星号=RP 动作/叙述惯例,渲染成 serif 斜体;
             中括号在 RP 圈是 OOC 戏外话,不用)。桌面同功快捷键 Ctrl/⌘+I。 -->
        <button id="actBtn" type="button" class="actbtn" aria-label="插入动作" data-i18n-aria="ariaAction" data-i18n-title="titleAction">
          <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M6.8 8.5l10.4 7M17.2 8.5 6.8 15.5"/></svg>
        </button>
        <textarea id="input" rows="1" placeholder="续写这一场…" data-i18n-placeholder="composerPlaceholder"></textarea>
        <button id="sendBtn" type="submit" class="sendbtn" aria-label="发送" data-i18n-aria="ariaSend"></button>
      </form>
    </main>

    <aside id="panel" class="pane">
      <div id="panelBody" class="panelBody"></div>
    </aside>
  </div>

  <div id="scrim" class="scrim"></div>
  <div id="modal" class="modal hidden"></div>
  <div id="toast" class="toast hidden"></div>

  <script src="i18n.js?v=20260717-1"></script>
  <script src="bridge.js"></script>
  <script src="app.js?v=20260717-1"></script>
</body>
</html>
